name: Notarize macOS

# Triggered automatically after Release workflow succeeds,
# or manually for a specific tag.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to notarize (e.g. v0.1.1)'
        required: true
        type: string

jobs:
  notarize:
    name: Notarize macOS Universal
    # For workflow_run: only run if the release succeeded
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p work
          gh release download "${{ steps.tag.outputs.tag }}" \
            --pattern "claw-fleet-macos.pkg" \
            --dir work/ \
            --repo "${{ github.repository }}"
          echo "Downloaded:"
          ls -lh work/

      - name: Decode API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: |
          mkdir -p private_keys
          echo "$API_KEY_BASE64" | base64 --decode > "private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8"

      - name: Notarize and staple
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -o pipefail
          for artifact in work/*.pkg; do
            [ -f "$artifact" ] || continue
            echo "── Submitting $(basename "$artifact") for notarization..."
            xcrun notarytool submit "$artifact" \
              --key "private_keys/AuthKey_${API_KEY_ID}.p8" \
              --key-id "$API_KEY_ID" \
              --issuer "$API_ISSUER_ID" \
              --wait \
              --timeout 15m \
              2>&1 | tee notarize-output.log
            NOTARY_EXIT=$?

            SUB_ID=$(grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' notarize-output.log | head -1)

            if [ $NOTARY_EXIT -ne 0 ] || grep -q "status: Rejected\|status: Invalid" notarize-output.log; then
              echo "── Notarization failed or rejected. Fetching detailed log..."
              if [ -n "$SUB_ID" ]; then
                xcrun notarytool log "$SUB_ID" \
                  --key "private_keys/AuthKey_${API_KEY_ID}.p8" \
                  --key-id "$API_KEY_ID" \
                  --issuer "$API_ISSUER_ID" \
                  notarize-log.json || true
                echo "── Notarization detailed log:"
                cat notarize-log.json 2>/dev/null || echo "(no log available)"
                echo ""
                echo "── Notarization info:"
                xcrun notarytool info "$SUB_ID" \
                  --key "private_keys/AuthKey_${API_KEY_ID}.p8" \
                  --key-id "$API_KEY_ID" \
                  --issuer "$API_ISSUER_ID" || true
              else
                echo "(could not extract submission ID)"
              fi
              exit 1
            fi

            echo "── Stapling $(basename "$artifact")..."
            xcrun stapler staple "$artifact"
            echo "── Done: $(basename "$artifact")"
          done

      - name: Replace release assets with notarized versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for artifact in work/*.pkg; do
            [ -f "$artifact" ] || continue
            echo "Uploading $(basename "$artifact") → ${{ steps.tag.outputs.tag }}"
            gh release upload "${{ steps.tag.outputs.tag }}" "$artifact" \
              --clobber \
              --repo "${{ github.repository }}"
          done
